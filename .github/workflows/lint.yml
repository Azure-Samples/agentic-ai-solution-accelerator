name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  accelerator-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src patterns scripts
      - name: Pyright
        run: pyright src patterns
      - name: Accelerator lint (~30 rules)
        run: python scripts/accelerator-lint.py
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r <(python -c "import tomllib,sys; d=tomllib.loads(open('pyproject.toml','rb').read().decode()); print('\n'.join(d['project']['dependencies']))")
