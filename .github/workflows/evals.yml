name: evals

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install httpx pyyaml
      - name: Enforce EVALS_API_URL is configured
        # Fail early: a private pilot that's green because evals never ran is
        # worse than an obvious "please configure this" error.
        run: |
          if [ -z "${{ vars.EVALS_API_URL }}" ]; then
            echo "::error::repo variable EVALS_API_URL is not set; acceptance cannot be verified."
            exit 1
          fi
      - name: Quality evals
        run: python evals/quality/run.py --api-url "${{ vars.EVALS_API_URL }}"
      - name: Red-team evals
        run: python evals/redteam/run.py --api-url "${{ vars.EVALS_API_URL }}"
      - name: Enforce full acceptance block from accelerator.yaml
        run: python scripts/enforce-acceptance.py

