name: deploy

# Deploy chain: lint -> azd-up -> evals.
# The lint rule `deploy_gated_on_lint_and_evals` statically verifies this chain.
# Evals run AFTER azd-up so the URL is emitted by the deploy itself; this avoids
# the day-0 chicken-and-egg where the repo has no URL to eval against.

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  accelerator-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src patterns scripts
      - name: Pyright
        run: pyright src patterns
      - name: Accelerator lint
        run: python scripts/accelerator-lint.py

  azd-up:
    needs: [accelerator-lint]
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      api_url: ${{ steps.deploy.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Install azd
        uses: Azure/setup-azd@v2
      - name: Provision + deploy
        id: deploy
        env:
          AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          azd env new "$AZURE_ENV_NAME" --location "$AZURE_LOCATION" --subscription "$AZURE_SUBSCRIPTION_ID" --no-prompt || true
          azd up --no-prompt
          # Emit the API URL from azd env so downstream evals can hit it.
          API_URL="$(azd env get-value API_URL 2>/dev/null || true)"
          if [ -z "$API_URL" ]; then
            API_URL="$(azd env get-value SERVICE_API_URI 2>/dev/null || true)"
          fi
          if [ -z "$API_URL" ]; then
            echo "::error::azd deploy completed but no API_URL/SERVICE_API_URI was emitted from the bicep outputs"
            exit 1
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

  evals:
    needs: [azd-up]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Quality evals
        run: python evals/quality/run.py --api-url "${{ needs.azd-up.outputs.api_url }}"
      - name: Red-team evals
        run: python evals/redteam/run.py --api-url "${{ needs.azd-up.outputs.api_url }}"
      - name: Enforce acceptance block from accelerator.yaml
        run: python scripts/enforce-acceptance.py
