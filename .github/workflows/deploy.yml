name: deploy

# This workflow is a TEMPLATE for partners forking this accelerator.
# It is NOT auto-run on the canonical Azure-Samples template repo —
# the template has no live Azure deployment, no SERVICE_PRINCIPAL
# secrets, and no `vars.AZURE_LOCATION`.
#
# Partners forking this repo to deliver a customer engagement should:
#   1. Configure a GitHub Environment matching `deploy/environments.yaml`
#      (default name: `production`), with these secrets:
#        - AZURE_CLIENT_ID
#        - AZURE_TENANT_ID
#        - AZURE_SUBSCRIPTION_ID
#      and these vars:
#        - AZURE_LOCATION
#   2. (Optional) Re-enable an automatic trigger by adding `push:` or
#      `pull_request:` blocks to the `on:` section below.
#   3. Trigger this workflow from the Actions UI via `workflow_dispatch`.
#
# Deploy chain: accelerator-lint -> resolve-env -> azd-up -> post-deploy evals.
#
# BYO-Azure multi-environment:
#   * `deploy/environments.yaml` is the source of truth for which Azure
#     environments this template can target. The `resolve-env` job parses
#     it, picks the correct entry based on `workflow_dispatch.inputs.env_name`
#     (or falls back to `default_env` on push), and emits both the azd
#     environment name and the matching GitHub Environment name. The
#     `azd-up` job binds to the resolved GitHub Environment so it picks
#     up scoped OIDC secrets + AZURE_LOCATION.
#   * The azd env name is NOT read from `vars.AZURE_ENV_NAME`; it is
#     derived from the manifest to prevent drift between the repo's
#     declared envs and what GitHub Actions actually deploys to.
#
# Gating posture:
#   * PR-time `.github/workflows/evals.yml` is the merge gate.
#   * This workflow is the post-deploy regression safety net; evals run
#     AFTER `azd up` so the API URL comes from the deploy itself.
#
# Lint rules that statically verify this chain:
#   * `deploy_gated_on_lint_and_evals` — job dependency chain.
#   * `deploy_matrix_matches_azure_envs` — manifest + resolve-env wiring.

on:
  workflow_dispatch:
    inputs:
      env_name:
        description: Name of an environment listed in deploy/environments.yaml. Leave blank to deploy default_env.
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  accelerator-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src patterns scripts
      - name: Pyright
        run: pyright src patterns
      - name: Accelerator lint
        run: python scripts/accelerator-lint.py

  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      azd_env_name: ${{ steps.resolve.outputs.azd_env_name }}
      github_environment: ${{ steps.resolve.outputs.github_environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Resolve Azure environment from deploy/environments.yaml
        id: resolve
        env:
          INPUT_ENV_NAME: ${{ inputs.env_name }}
        run: |
          python - <<'PY'
          import os, sys, pathlib
          try:
              import yaml
          except ImportError:
              os.system("pip install pyyaml")
              import yaml
          manifest = pathlib.Path("deploy/environments.yaml")
          data = yaml.safe_load(manifest.read_text(encoding="utf-8")) or {}
          envs = data.get("environments") or []
          default_env = data.get("default_env")
          if not envs or not default_env:
              sys.exit("deploy/environments.yaml missing `environments[]` or `default_env`.")
          requested = (os.environ.get("INPUT_ENV_NAME") or "").strip() or default_env
          match = next((e for e in envs if e.get("name") == requested), None)
          if match is None:
              names = ", ".join(sorted(e.get("name", "") for e in envs))
              sys.exit(f"Environment '{requested}' not found in deploy/environments.yaml. Known: {names}.")
          gh_env = match.get("github_environment") or match["name"]
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as fh:
              fh.write(f"azd_env_name={match['name']}\n")
              fh.write(f"github_environment={gh_env}\n")
          print(f"Resolved azd_env_name={match['name']} github_environment={gh_env}")
          PY

  azd-up:
    needs: [accelerator-lint, resolve-env]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-env.outputs.github_environment }}
    outputs:
      api_url: ${{ steps.deploy.outputs.api_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: Azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Install azd
        uses: Azure/setup-azd@v2
      - name: Provision + deploy
        id: deploy
        env:
          AZURE_ENV_NAME: ${{ needs.resolve-env.outputs.azd_env_name }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          azd env new "$AZURE_ENV_NAME" --location "$AZURE_LOCATION" --subscription "$AZURE_SUBSCRIPTION_ID" --no-prompt || true
          azd up --no-prompt
          # Emit the API URL from azd env so downstream evals can hit it.
          API_URL="$(azd env get-value API_URL 2>/dev/null || true)"
          if [ -z "$API_URL" ]; then
            API_URL="$(azd env get-value SERVICE_API_URI 2>/dev/null || true)"
          fi
          if [ -z "$API_URL" ]; then
            echo "::error::azd deploy completed but no API_URL/SERVICE_API_URI was emitted from the bicep outputs"
            exit 1
          fi
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

  evals:
    needs: [azd-up]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Quality evals
        run: python evals/quality/run.py --api-url "${{ needs.azd-up.outputs.api_url }}"
      - name: Red-team evals
        run: python evals/redteam/run.py --api-url "${{ needs.azd-up.outputs.api_url }}"
      - name: Enforce acceptance block from accelerator.yaml
        run: python scripts/enforce-acceptance.py
