name: version-matrix

# Weekly GA SDK freshness check. Reads `ga-versions.yaml`, queries PyPI for
# the latest non-pre-release of each canonical SDK, and opens an issue if
# any pinned `min` is behind the latest GA. No smoke build / dead imports.

on:
  schedule:
    - cron: "0 7 * * 1" # weekly Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  ga-sdk-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: python -m pip install --upgrade pip pyyaml
      - name: Check PyPI for drift
        id: check
        continue-on-error: true
        run: |
          set +e
          python scripts/ga-sdk-freshness.py --out drift.txt 2> unknown.txt
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
      - name: Surface transient PyPI lookup failures (non-fatal)
        if: always()
        run: |
          if [ -s unknown.txt ]; then
            echo "### PyPI lookup warnings (transient; not drift)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat unknown.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Open tracking issue on drift
        if: steps.check.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('drift.txt', 'utf8');
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `ga-sdk-freshness: PyPI drift (${new Date().toISOString().slice(0,10)})`,
              body: `Weekly check found newer GA releases on PyPI. Bump \`ga-versions.yaml\` and \`pyproject.toml\` together; re-run lint.\n\n${body}`,
              labels: ['version-matrix', 'tracking']
            });
      - name: Fail if drift
        if: steps.check.outputs.exit_code == '1'
        run: exit 1
