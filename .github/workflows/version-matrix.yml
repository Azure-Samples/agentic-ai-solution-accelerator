name: version-matrix

on:
  schedule:
    - cron: "0 7 * * 1" # weekly Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  latest-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install with latest SDKs
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install --upgrade \
            "agent-framework" \
            "azure-ai-projects" \
            "azure-ai-agents" \
            "azure-identity" \
            "azure-monitor-opentelemetry" \
            "azure-search-documents" \
            "azure-mgmt-cognitiveservices" \
            "fastapi" "pydantic" "httpx" "uvicorn"
      - name: Import + lint smoke
        run: |
          python -c "import src.main; import src.workflow.sales_research_workflow"
          python scripts/accelerator-lint.py
      - name: Open tracking issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `version-matrix: weekly smoke failed (${new Date().toISOString().slice(0,10)})`,
              body: 'Weekly test against latest SDKs failed. Update `docs/version-matrix.md` and pins in `pyproject.toml`.',
              labels: ['version-matrix', 'tracking']
            });
