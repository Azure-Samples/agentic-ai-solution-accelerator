# GA API-version exceptions for the accelerator's IaC.
#
# The accelerator lint (`scripts/accelerator-lint.py`) rejects any Azure
# resource in `infra/**` that uses a `*-preview` api-version. Entries here are
# the ONLY narrow exemptions, each of which MUST have:
#   - resource_type: full ARM type, e.g. Microsoft.X/y/z
#   - api_version: the preview version in use
#   - reason: why no GA equivalent exists yet
#   - revisit_by: month/year to re-evaluate and remove
#
# Adding an entry here is not a green light; it is an admission that the
# accelerator cannot currently claim "fully GA" for that one resource.

exceptions:
  - resource_type: Microsoft.CognitiveServices/accounts
    api_version: 2025-04-01-preview
    reason: >-
      The `allowProjectManagement` property required to host the Foundry
      `accounts/projects` child resource is not exposed in the GA 2024-10-01
      shape; ARM silently drops it, then the project deploy fails with
      "BadRequest: Project can only created under AIServices Kind account
      with allowProjectManagement set to true." Bumping the parent account to
      the same preview api-version as the project child resolves this. Model
      deployments and RAI policies remain on GA 2024-10-01.
    revisit_by: 2026-10
  - resource_type: Microsoft.CognitiveServices/accounts/projects
    api_version: 2025-04-01-preview
    reason: >-
      Microsoft Foundry project sub-resource does not yet have a non-preview
      api-version. Model deployments and RAI policies (the actual enforcement
      surfaces) are on GA 2024-10-01; only the project container is preview.
    revisit_by: 2026-10
