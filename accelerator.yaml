# accelerator.yaml — engagement manifest
#
# One source of truth for the engagement. Filled by the partner during the
# discovery workshop (or by `/scaffold-from-brief` chat mode reading
# docs/discovery/solution-brief.md). Read by:
#   - scripts/accelerator-lint.py (policy checks in CI)
#   - infra/ (some fields flow to Bicep parameters)
#   - evals/ (acceptance thresholds become CI gates)
#   - fleet reporting (rolled up across partner engagements)
#
# Keep it small and stable. If it feels like a DSL, something is wrong.

schema_version: "1.0"
accelerator_version: "1.0.0"   # pins to the template version partner cloned

# -----------------------------------------------------------------------------
# scenario:  HOW the accelerator plugs a concrete workflow into the framework.
# The partner changes this (or runs `scripts/scaffold-scenario.py`) to swap
# scenarios. Every field is resolved at process startup by
# `src.workflow.registry.load_scenario`.
#
# - `id`: scenario slug (hyphens allowed; appears in /healthz + logs).
# - `package`: dotted Python import path (leaf MUST use underscores).
# - `request_schema` / `workflow_factory` / `retrieval.indexes[].schema`:
#   "module:attr" form, relative to `package`. `request_schema` resolves to a
#   pydantic BaseModel subclass; `workflow_factory` resolves to a callable
#   that receives a `ScenarioContext` and returns a `BaseWorkflow`.
# - `endpoint.path`: the single POST route the FastAPI app mounts for this
#   scenario. Evals + smoke tests read this so nothing hardcodes `/research`.
# -----------------------------------------------------------------------------
scenario:
  id: sales-research
  package: src.scenarios.sales_research
  request_schema: schema:ResearchRequest
  workflow_factory: workflow:build_workflow
  endpoint:
    path: /research/stream
  agents:
    - { id: supervisor,            foundry_name: accel-sales-research-supervisor }
    - { id: account_planner,       foundry_name: accel-account-planner }
    - { id: icp_fit_analyst,       foundry_name: accel-icp-fit-analyst }
    - { id: competitive_context,   foundry_name: accel-competitive-context }
    - { id: outreach_personalizer, foundry_name: accel-outreach-personalizer }
  retrieval:
    indexes:
      - name: accounts
        seed: data/samples/accounts.json
        schema: retrieval:index_definition
  evals:
    quality_dataset: evals/quality/golden_cases.jsonl
    redteam_dataset: evals/redteam/cases.jsonl

# -----------------------------------------------------------------------------
# solution:  WHO + WHAT — derived from docs/discovery/solution-brief.md
# -----------------------------------------------------------------------------
solution:
  name: "sales-research-outreach"          # flagship default; rename per engagement
  brief: docs/discovery/solution-brief.md  # canonical engagement doc
  pattern: supervisor-routing              # supervisor-routing (flagship) | single-agent | chat-with-actioning
  hitl: required                           # required | optional | none
  data_residency: unset                    # unset | us | eu | apac | custom
  identity: entra-id                       # entra-id | external-id | custom
  side_effect_tools:                       # every name here must exist in src/tools/ and pass HITL
    - crm_write_contact
    - send_email
  grounding_sources:
    - ai_search_index: accounts            # declared in infra/modules/ai-search.bicep
    - web_search: bing                     # partner-scoped allow-list

# -----------------------------------------------------------------------------
# acceptance:  MEASURABLE GATES — lint verifies each has a matching eval
# -----------------------------------------------------------------------------
acceptance:
  quality_threshold: 0.75      # avg golden-case score (0..1)
  groundedness_threshold: 0.85 # avg groundedness on RAG cases (0..1)
  p95_latency_ms: 90000        # 90s per briefing at P95
  cost_per_call_usd: 0.40      # $ per briefing at average
  redteam_must_pass: true      # XPIA + jailbreak suite must pass — zero tolerance

# -----------------------------------------------------------------------------
# controls:  NON-NEGOTIABLES — enforced by lint + infra
# -----------------------------------------------------------------------------
controls:
  managed_identity: true       # no keys in app code
  key_vault: true              # all secrets referenced, never inlined
  content_filters: iac         # iac | portal (portal is a lint failure)
  private_endpoints: optional  # required | optional (env-dependent)
  telemetry: required          # App Insights wired, custom events emitted
  evals_in_ci: required        # evals/ runs on every PR

# -----------------------------------------------------------------------------
# kpis:  ROI INSTRUMENTATION — typed events emitted by accelerator_baseline.telemetry
# -----------------------------------------------------------------------------
kpis:
  - name: briefing_production_time
    type: duration_ms
    baseline: 10800000         # 3 hours manual research
    target:   90000            # 90 seconds agent briefing
  - name: outreach_reply_rate
    type: ratio
    baseline: 0.02             # cold baseline
    target:   0.08             # personalised agent outreach
  - name: hitl_approval_rate
    type: ratio
    baseline: 1.0              # 100% manual
    target:   0.9              # agents surface 90% of drafts that ship as-is
