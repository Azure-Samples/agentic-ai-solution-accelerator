# Drift Classification Rules
# This file is versioned per baseline release and signed via sigstore.
# Consumed by `baseline reconcile` and `baseline doctor --preflight`.
# Updates require accelerator-eng approval + release manifest entry.

version: "0.1.0"
signed_by: "sigstore:github.com/Azure/agentic-ai-solution-accelerator"

# ---------------------------------------------------------------------------
# BLOCK class — drift must be reconciled before upgrade or deploy proceeds.
# These break attestation, security posture, or bundle invariants.
# ---------------------------------------------------------------------------
block:
  - id: "BLOCK-RAI-MODEL-SWAP"
    scope: "foundry"
    description: "Model ID or alias changed in Foundry portal vs attested Spec."
    check: "foundry.agents[*].model_id != spec.model.id || foundry.agents[*].model_alias != spec.model.alias"
    remediation: "Update Spec.model and re-attest, or revert Foundry change."

  - id: "BLOCK-RAI-SIDE-EFFECT-TOOL-ADDED"
    scope: "foundry"
    description: "Tool with side_effect=true appeared in Foundry portal not present in attested Spec."
    check: "foundry.tools[?side_effect=true].id NOT IN spec.tools[?side_effect=true].id"
    remediation: "Add tool to Spec + update bundle to actioning-* + HITL + re-attest."

  - id: "BLOCK-RAI-INSTRUCTION-DRIFT"
    scope: "foundry"
    description: "instruction_hash differs between attestation snapshot and live Foundry state."
    check: "sha256(live_instructions) != attestation.rai_tuple.instruction_hash"
    remediation: "Snapshot new instructions, re-run RAI IA review if material, re-attest."

  - id: "BLOCK-RAI-GROUNDING-SOURCE-ADDED"
    scope: "foundry|spec"
    description: "Grounding source appeared that is not in attested manifest."
    check: "live.grounding.sources NOT SUBSET OF spec.grounding.sources (by id)"
    remediation: "Add to Spec.grounding.sources + verify ACL model + re-attest."

  - id: "BLOCK-RAI-TOPOLOGY-CHANGE"
    scope: "code|spec"
    description: "Agent topology (agents, edges, HITL points, a2a cap) in deployed code differs from Spec."
    check: "sha256(code.topology) != attestation.rai_tuple.topology_hash"
    remediation: "Round-trip topology change through Spec + update RAI IA + re-attest."

  - id: "BLOCK-NET-PROFILE-CHANGE"
    scope: "azure"
    description: "Network profile changed (e.g., private endpoint removed, public IP added)."
    check: "container_apps.network_profile != bicep.expected_profile"
    remediation: "Revert network change OR change bundle profile + re-attest."

  - id: "BLOCK-IDENTITY-MODEL-CHANGE"
    scope: "azure"
    description: "Managed identity assignment changed; data-plane identity shifted."
    check: "container_apps.identity != bicep.expected_identity"
    remediation: "Revert OR update identity_model in qualification + re-attest."

  - id: "BLOCK-BUNDLE-MISMATCH"
    scope: "spec"
    description: "Deployed profile doesn't match bundle's required profile."
    check: "spec.profile NOT IN allowed_profiles(spec.bundle)"
    remediation: "Fix Spec.profile OR change bundle."

  - id: "BLOCK-KILL-SWITCH-BYPASSED"
    scope: "code"
    description: "T1 kill switch not wired on critical tool invocations."
    check: "baseline_core.kill_switch_check() NOT found on side_effect_tool_calls"
    remediation: "Restore kill switch wiring; re-attest."

  - id: "BLOCK-COST-CEILING-BYPASSED"
    scope: "code|config"
    description: "Cost ceiling enforcement disabled or stubbed."
    check: "cost_tracker.enforcement == disabled"
    remediation: "Re-enable; re-attest."

# ---------------------------------------------------------------------------
# WARN class — upgrade proceeds; drift logged + recorded in attestation.
# Config-level non-security drift. Partner-visible warnings.
# ---------------------------------------------------------------------------
warn:
  - id: "WARN-SKU-TIER-CHANGE"
    scope: "azure"
    description: "Container Apps / AI Search / App Config SKU changed (within allowed set)."
    check: "sku != bicep.expected_sku && sku IN allowed_sku_set(profile)"

  - id: "WARN-APP-CONFIG-SCALE-CHANGE"
    scope: "azure"
    description: "Scale rules adjusted via portal."
    check: "scale_rules.*.threshold != bicep.expected_scale"

  - id: "WARN-ALERT-THRESHOLD-INCREASE"
    scope: "azure"
    description: "Alert threshold made more permissive than baseline default."
    check: "alert.threshold > materialized.threshold"

  - id: "WARN-OVERRIDE-DRIFT-FROM-MATERIALIZED"
    scope: "repo"
    description: "Partner override file exists but drifts from accepted override schema."
    check: "override_file validates != baseline.override_schema"

  - id: "WARN-GROUNDING-LAST-SNAPSHOT-AGE"
    scope: "spec"
    description: "Grounding source manifest snapshot > 30 days old."
    check: "now - grounding.sources[*].last_snapshot_ref.timestamp > 30d"

# ---------------------------------------------------------------------------
# AUTO-ADOPT class — silently reconciled; lockfile + attestation record new state.
# ---------------------------------------------------------------------------
auto_adopt:
  - id: "AUTO-FOUNDRY-CONNECTOR-MINOR-UPGRADE"
    scope: "foundry"
    description: "Foundry auto-upgraded a built-in connector to a new minor version."
    check: "live.connector.version > attested.connector.version && same major"

  - id: "AUTO-BICEP-MODULE-IDEMPOTENT-REAPPLY"
    scope: "azure"
    description: "Bicep re-apply produced no semantic diff (noop)."
    check: "whatIf result == []"

  - id: "AUTO-APP-CONFIG-LABEL-REFRESH"
    scope: "azure"
    description: "App Config label rotation from CI, value unchanged."
    check: "label changed && value.hash == prior.hash"

  - id: "AUTO-SCHEMA-MINOR-FORWARD-COMPAT"
    scope: "repo"
    description: "Schema minor version bump that's forward-compatible."
    check: "schema_version.minor > prior && major ==, breaking_changes[] empty"

# ---------------------------------------------------------------------------
# Unknown drift — treated as `warn` by default, surfaced to governance review quarterly.
# Any drift not matching a rule above is logged and reviewed by accelerator-eng
# to promote into a versioned rule (block / warn / auto-adopt) in a future release.
# ---------------------------------------------------------------------------
unknown_default: "warn"
