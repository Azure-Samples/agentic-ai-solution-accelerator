site_name: Agentic AI Solution Accelerator
site_description: Partner guide for delivering agentic AI solutions to SMB customers on Microsoft Agent Framework + Azure AI Foundry.
site_url: https://azure-samples.github.io/agentic-ai-solution-accelerator/
repo_url: https://github.com/Azure-Samples/agentic-ai-solution-accelerator
repo_name: Azure-Samples/agentic-ai-solution-accelerator
edit_uri: edit/main/docs/
docs_dir: docs-build
site_dir: site

# Validation -- promote link/anchor drift to warnings so `mkdocs build --strict`
# catches them in CI. Default mkdocs only validates nav files; anchors are info-only
# unless we explicitly raise them. This is what lets prepare-pages + strict together
# enforce that a partner's edits to docs/ don't silently break Pages anchors.
validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    absolute_links: warn
    unrecognized_links: warn
    anchors: warn

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - include-markdown

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

