# azd config for the Agentic AI Solution Accelerator template
#
# Partners run `azd up` after filling env vars; Bicep in infra/ provisions
# Foundry + AI Search + Key Vault + Container Apps + App Insights with
# managed identity. No keys. Content filters applied via IaC.
name: agentic-ai-solution-accelerator
metadata:
  template: agentic-ai-solution-accelerator@1.0.0
services:
  api:
    project: ./src
    language: python
    host: containerapp
    docker:
      path: Dockerfile
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  postprovision:
    posix:
      shell: sh
      run: |
        set -e
        echo "[postprovision] creating/verifying Foundry agents..."
        python scripts/foundry-bootstrap.py
        echo "[postprovision] creating/seeding AI Search 'accounts' index..."
        python scripts/seed-search.py
        echo "[postprovision] done. Run 'azd deploy' to push the agent."
    windows:
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        Write-Host "[postprovision] creating/verifying Foundry agents..."
        python scripts/foundry-bootstrap.py
        Write-Host "[postprovision] creating/seeding AI Search 'accounts' index..."
        python scripts/seed-search.py
        Write-Host "[postprovision] done. Run 'azd deploy' to push the agent."
  postdeploy:
    shell: sh
    run: |
      echo "Deployed. Acceptance evals will run on your next PR."
      echo "Dashboards: see infra/dashboards/roi-kpis.json, opened by 'azd monitor'."
