# azd config for the Agentic AI Solution Accelerator template
#
# Partners run `azd up` after filling env vars; Bicep in infra/ provisions
# Foundry + AI Search + Key Vault + Container Apps + App Insights with
# managed identity. No keys. Content filters applied via IaC.
name: agentic-ai-solution-accelerator
metadata:
  template: agentic-ai-solution-accelerator@1.0.0
services:
  api:
    project: ./src
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      remoteBuild: true
infra:
  provider: bicep
  path: infra
  module: main
hooks:
  preprovision:
    posix:
      shell: sh
      run: |
        set -e
        if [ ! -f .azd-hooks/.ready ] || [ ! -x .azd-hooks/.venv/bin/python ]; then
          echo "[preprovision] hook environment not initialized. Run: sh scripts/setup-hooks.sh"
          exit 1
        fi
        echo "[preprovision] syncing accelerator.yaml models block -> azd env..."
        .azd-hooks/.venv/bin/python scripts/sync-models-from-manifest.py
    windows:
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path ".azd-hooks\.ready") -or -not (Test-Path ".azd-hooks\.venv\Scripts\python.exe")) {
          throw "[preprovision] hook environment not initialized. Run: pwsh -File scripts/setup-hooks.ps1"
        }
        Write-Host "[preprovision] using repo-local hook venv: .azd-hooks\.venv"
        Write-Host "[preprovision] syncing accelerator.yaml models block -> azd env..."
        & .azd-hooks\.venv\Scripts\python.exe scripts/sync-models-from-manifest.py
        if ($LASTEXITCODE -ne 0) { throw "[preprovision] sync-models failed (exit $LASTEXITCODE)" }
  postprovision:
    posix:
      shell: sh
      run: |
        set -e
        if [ ! -f .azd-hooks/.ready ] || [ ! -x .azd-hooks/.venv/bin/python ]; then
          echo "[postprovision] hook environment not initialized. Run: sh scripts/setup-hooks.sh"
          exit 1
        fi
        echo "[postprovision] creating/verifying Foundry agents..."
        .azd-hooks/.venv/bin/python scripts/foundry-bootstrap.py
        echo "[postprovision] creating/seeding AI Search 'accounts' index..."
        .azd-hooks/.venv/bin/python scripts/seed-search.py
        echo "[postprovision] done. Run 'azd deploy' to push the agent."
    windows:
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        if (-not (Test-Path ".azd-hooks\.ready") -or -not (Test-Path ".azd-hooks\.venv\Scripts\python.exe")) {
          throw "[postprovision] hook environment not initialized. Run: pwsh -File scripts/setup-hooks.ps1"
        }
        Write-Host "[postprovision] using repo-local hook venv: .azd-hooks\.venv"
        Write-Host "[postprovision] creating/verifying Foundry agents..."
        & .azd-hooks\.venv\Scripts\python.exe scripts/foundry-bootstrap.py
        if ($LASTEXITCODE -ne 0) { throw "[postprovision] foundry-bootstrap failed (exit $LASTEXITCODE)" }
        Write-Host "[postprovision] creating/seeding AI Search 'accounts' index..."
        & .azd-hooks\.venv\Scripts\python.exe scripts/seed-search.py
        if ($LASTEXITCODE -ne 0) { throw "[postprovision] seed-search failed (exit $LASTEXITCODE)" }
        Write-Host "[postprovision] done. Run 'azd deploy' to push the agent."
  postdeploy:
    shell: sh
    run: |
      echo "Deployed. Acceptance evals will run on your next PR."
      echo "Dashboards: see infra/dashboards/roi-kpis.json, opened by 'azd monitor'."
